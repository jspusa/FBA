<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>入庫計畫模板</title>
  <style>
    :root { --bg:#f3f6fc; --card:#fff; --text:#1f2a44; --muted:#5f6d8c; --line:#dbe4f5; --accent:#4f7cff; --soft:#eef3ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC",Arial; background:var(--bg); color:var(--text); }
    header { padding:18px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(243,246,252,.9); backdrop-filter:blur(10px); z-index:9; }
    header h1 { margin:0; font-size:18px; letter-spacing:.5px; }
    header .sub { margin-top:6px; color:var(--muted); font-size:13px; line-height:1.4; }
    main { padding:18px 20px 28px; max-width:1200px; margin:0 auto; }
    .top-tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .top-tab { border:1px solid var(--line); background:var(--soft); color:var(--text); padding:10px 14px; border-radius:12px; font-weight:700; text-decoration:none; }
    .top-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:24px; box-shadow:0 10px 28px rgba(36,54,91,.08); }
    .card h2 { margin:0 0 8px; font-size:18px; }
    .card p { margin:0; color:var(--muted); line-height:1.6; }
  </style>
</head>
<body>
<header>
  <h1>入庫計畫模板</h1>
  <div class="sub">此頁已預留，可直接貼上你的 Amazon 入庫 Excel 自動產生器 HTML。</div>
</header>
<main>
  <nav class="top-tabs" aria-label="功能選單">
    <a class="top-tab" href="index.html">① 計算入庫數量</a>
    <a class="top-tab active" href="inbound-plan.html" aria-current="page">② 入庫計畫模板</a>
    <a class="top-tab" href="shipment.html">③ Amazon 棧板擷取</a>
    <a class="top-tab" href="sorter.html">④ FBA 檔案整理器</a>
    <a class="top-tab" href="email.html">⑤ 出貨通知 Email</a>
  </nav>
  <section class="card">
    <h2>入庫計畫模板預留區</h2>
    <p>把準備好的 HTML 內容貼進 <code>inbound-plan.html</code>，並保留上方功能選單即可。</p>
  </section>
</main>
</body>
</html>
