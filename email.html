<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>出貨通知 Email 產生器</title>
  <style>
:root {
      --bg:#f3f6fc;
      --card:#ffffff;
      --muted:#5f6d8c;
      --text:#1f2a44;
      --accent:#4f7cff;
      --ok:#0f9f6e;
      --warn:#ca8a04;
      --err:#e11d48;
      --line:#dbe4f5;
      --soft:#eef3ff;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", Arial; background:var(--bg); color:var(--text); }
    header { padding:18px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(243,246,252,.9); backdrop-filter: blur(10px); z-index:9; }
    header h1 { margin:0; font-size:18px; letter-spacing:.5px; }
    header .sub { margin-top:6px; color:var(--muted); font-size:13px; line-height:1.4; }
    main { padding:18px 20px 28px; max-width:1200px; margin:0 auto; }
    .stack { display:grid; grid-template-columns:1fr; gap:14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:0 10px 28px rgba(36,54,91,.08); }
    .card h2 { margin:0 0 10px; font-size:15px; display:flex; align-items:center; gap:10px; }
    .pill { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:var(--soft); }
    .drop {
      border:2px dashed rgba(79,124,255,.35);
      border-radius:16px;
      padding:14px;
      min-height:110px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:10px;
      background:#f7f9ff;
      transition:.15s ease;
    }
    .drop.dragover { border-color: rgba(79,124,255,.9); background:rgba(79,124,255,.10); transform: translateY(-1px); }
    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .btn {
      appearance:none; border:1px solid var(--line);
      background:#fff; color:var(--text);
      padding:9px 12px; border-radius:12px; cursor:pointer;
      font-size:13px; transition:.15s ease; user-select:none;
    }
    .btn:hover { border-color: rgba(79,124,255,.7); background:#f4f7ff; }
    .btn.primary { border-color: rgba(79,124,255,.7); background:#e8efff; }
    .btn.link { display:inline-block; text-decoration:none; }
    .btn.danger { border-color: rgba(225,29,72,.35); background:rgba(225,29,72,.05); }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    input[type="file"]{ display:none; }
    select, input[type="text"]{
      border-radius:12px; padding:9px 10px; font-size:13px; color:var(--text);
      background:#fff; border:1px solid var(--line);
      outline:none; min-width:260px;
    }
    select:focus, input[type="text"]:focus{ border-color: rgba(79,124,255,.7); }
    .hint { color:var(--muted); font-size:12px; line-height:1.45; }
    .log { margin-top:10px; font-size:12px; color:var(--muted); line-height:1.5; max-height:120px; overflow:auto; padding-right:6px; }
    .log b { color:var(--text); }
    .ok { color:var(--ok); }
    .warn { color:var(--warn); }
    .err { color:var(--err); }
    .split { display:grid; grid-template-columns: 1fr; gap:14px; margin-top:14px; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; font-size:12px; border-bottom:1px solid var(--line); padding:9px 8px; vertical-align:top; }
    th { color:var(--muted); font-weight:600; background:#f8faff; }
    .check { font-weight:700; }
    .check.ok { color:var(--ok); }
    .check.err { color:var(--err); }
    .check.warn { color:var(--warn); }
    .summary-head { display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; }
    .floating-alias { position:fixed; right:18px; top:14px; z-index:11; }
    .alias-modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:30;padding:24px;align-items:center;justify-content:center}
    .alias-modal.open{display:flex}
    .alias-panel{width:min(980px,100%);max-height:85vh;overflow:auto}
    .alias-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .card.collapsible .card-collapse-body{display:block}
    .card.collapsible.collapsed .card-collapse-body{display:none}
    .collapse-trigger{cursor:pointer;user-select:none}
    .collapse-indicator{font-size:12px;color:var(--muted);margin-left:8px}
    .small { font-size:12px; color:var(--muted); }

    .top-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .top-tab{appearance:none;border:1px solid var(--line);background:#eef3ff;color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:700}
    .top-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .page{display:none}
    .page.active{display:block}

    .tool-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 10px 28px rgba(36,54,91,.08)}
    .is-hidden{display:none !important}
    .tool-grid{display:grid;grid-template-columns:repeat(2,minmax(240px,1fr));gap:12px}
    .tool-grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
    .tool-status{margin-top:14px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#f8fafc;font-size:13px}
    .tool-status.ok{color:var(--ok);border-color:#b7ebc7;background:#f1fcf4}
    .tool-status.bad{color:var(--err);border-color:#f3c1c1;background:#fff5f5}
    .tool-table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}
    .tool-table-wrap table{width:100%;border-collapse:collapse}
    .tool-table-wrap th,.tool-table-wrap td{padding:8px 10px;border-bottom:1px solid #edf1f5;text-align:left;white-space:nowrap}
    .tool-pills{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .tool-pill{background:#eff6ff;color:#1d4ed8;border:1px solid #c7dcff;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .inner-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .inner-tab{background:#eef2f7;color:var(--text);border:0;border-radius:10px;padding:8px 12px;cursor:pointer}
    .inner-tab.active{background:var(--accent);color:#fff}
    .email-preview{border:1px solid var(--line);background:#fcfcfd;border-radius:12px;padding:14px;line-height:1.6}
    .email-table{border-collapse:collapse;width:100%;margin:10px 0 0;background:#fff}
    .email-table th,.email-table td{border:1px solid #cfd8e3;padding:8px 10px;text-align:left;vertical-align:top}
    @media (max-width:980px){.tool-grid,.tool-grid-3{grid-template-columns:1fr}}


.top-tabs a { text-decoration:none; }

/* 與補貨整合首頁一致的工作台視覺 */
:root{--page:#f5f5f7;--surface:#fff;--surface-soft:#fbfbfd;--text:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.08);--blue:#0071e3;--green:#248a3d;--red:#d70015;--shadow:0 18px 55px rgba(0,0,0,.07)}
body{margin:0!important;color:var(--text)!important;background:var(--page)!important;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue","Noto Sans TC",Arial,sans-serif!important;-webkit-font-smoothing:antialiased}
.app-header{position:sticky;top:0;z-index:35;border-bottom:1px solid rgba(0,0,0,.06);background:rgba(245,245,247,.84);backdrop-filter:saturate(180%) blur(22px)}
.header-inner{max-width:1240px;margin:auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,#111,#454545);color:#fff;display:grid;place-items:center;font-weight:700;box-shadow:0 5px 14px rgba(0,0,0,.18)}
.brand-copy strong{display:block;font-size:15px;letter-spacing:-.01em}.brand-copy span{display:block;margin-top:2px;color:var(--muted);font-size:11px}
.top-tabs{display:flex!important;gap:4px!important;padding:4px!important;margin:0!important;border-radius:12px!important;background:rgba(118,118,128,.12)!important;overflow:auto;flex-wrap:nowrap!important}
.top-tab{border:0!important;color:#3a3a3c!important;text-decoration:none!important;white-space:nowrap;padding:7px 11px!important;border-radius:9px!important;background:transparent!important;font-size:12px!important;font-weight:600!important;box-shadow:none!important}
.top-tab:hover{background:rgba(255,255,255,.7)!important}.top-tab.active{color:#000!important;background:#fff!important;box-shadow:0 1px 4px rgba(0,0,0,.10)!important}
main{max-width:1240px!important;margin:0 auto!important;padding:52px 28px 72px!important}.page-hero{max-width:790px;margin:0 auto 34px;text-align:center}.page-hero h1{margin:0;font-size:clamp(34px,5vw,52px);line-height:1.05;letter-spacing:-.045em}.page-hero p{margin:15px auto 0;color:var(--muted);font-size:17px;line-height:1.55}
.card,.tool-card{background:var(--surface)!important;border:1px solid rgba(0,0,0,.06)!important;border-radius:28px!important;box-shadow:var(--shadow)!important;padding:26px!important}
.btn,button{border-radius:999px!important}.btn.primary,.primary{background:var(--blue)!important;color:#fff!important;border-color:var(--blue)!important}.btn.primary:hover,.primary:hover{background:#0077ed!important}
textarea,input,select{border:1px solid rgba(0,0,0,.13)!important;border-radius:14px!important;background:var(--surface-soft)!important;padding:12px!important;font:inherit}textarea:focus,input:focus,select:focus{outline:3px solid rgba(0,113,227,.16)!important;border-color:var(--blue)!important}
.tool-table-wrap,.preview{border-radius:16px}.field-help{display:block;margin-top:7px;color:var(--muted);font-size:11px;line-height:1.45}
.shipping-fields{display:grid;grid-template-columns:1.15fr .8fr .85fr;gap:20px;margin-top:18px;align-items:start}.field-block{min-width:0}.field-block>label{display:block;margin:0 0 8px;font-size:13px;font-weight:750;color:#3a3a3c}.field-block>input{width:100%;min-height:46px}.date-input.empty-date::-webkit-datetime-edit{color:transparent}.date-input.empty-date:focus::-webkit-datetime-edit{color:inherit}
.confirm-panel{margin-top:18px;padding:10px;border-radius:18px;background:#f7f7f9;border:1px solid rgba(0,0,0,.08);transition:.18s ease}.confirm-panel.complete{background:#eef9f1;border-color:#b7dfc1;box-shadow:0 0 0 3px rgba(36,138,61,.06)}
.confirm-check{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid transparent;border-radius:13px;cursor:pointer;font-size:13px;line-height:1.45;transition:.16s ease}.confirm-check+.confirm-check{margin-top:4px}.confirm-check:hover{background:#fff}.confirm-check input{appearance:none;width:22px!important;height:22px!important;min-width:22px!important;margin:0!important;padding:0!important;border:1.5px solid #b8b8bd!important;border-radius:7px!important;background:#fff!important;display:grid;place-items:center;cursor:pointer}.confirm-check input:checked{background:var(--green)!important;border-color:var(--green)!important}.confirm-check input:checked::after{content:'✓';color:#fff;font-size:14px;font-weight:900;line-height:1}.confirm-panel.complete .confirm-check{color:#176b2c}.confirm-panel.complete .confirm-check strong{color:#176b2c}
@media(max-width:860px){.header-inner{padding:12px 18px;align-items:flex-start;flex-direction:column}.top-tabs{width:100%}main{padding:38px 16px 56px!important}.brand-copy span{display:none}.tool-grid-3{grid-template-columns:1fr!important}}
@media(max-width:760px){.shipping-fields{grid-template-columns:1fr;gap:16px}}

</head>
<body><header class="app-header"><div class="header-inner"><div class="brand"><div class="brand-mark">J</div><div class="brand-copy"><strong>補貨工作台</strong><span>Jasper Pet Care Products, Inc.</span></div></div><nav class="top-tabs" aria-label="功能選單"><a class="top-tab" href="index.html">補貨整合</a><a class="top-tab" href="inbound-plan.html">入庫計畫</a><a class="top-tab" href="shipment.html">棧板擷取</a><a class="top-tab" href="sorter.html">FBA 整理</a><a class="top-tab active" href="email.html" aria-current="page">出貨通知</a></nav><button id="clearWorkspaceBtn" class="clear-workspace" type="button">開始新批次</button></div></header>
<main>
<section class="page-hero"><h1>出貨通知</h1><p>逐項確認 Pickup Date 與車數，再產生給 Tiffany 的信件。</p></section>

<section>
    <div class="tool-card">
      <h2>出貨通知信件產生器</h2>
      <label for="emailData">貼上 SKU 資料</label>
      <textarea id="emailData" style="width:100%;min-height:220px" placeholder="SKU&#9;CTN&#9;Quantity&#9;EXPIRE&#10;ATS01&#9;94&#9;8460&#9;9/27"></textarea><span class="field-help">會自動帶入「入庫計畫」的四欄資料；仍可在這裡修改，Quantity 會顯示在 CTN 右側。</span>
      <div class="shipping-fields">
        <div class="field-block"><label for="pickupDate">Pickup Date</label><input id="pickupDate" class="date-input empty-date" type="date" required /><span class="field-help">會優先帶入「FBA 整理」讀到的日期，仍需在下方勾選確認。</span></div>
        <div class="field-block"><label for="truckCount">分成幾車</label><input id="truckCount" type="number" min="1" max="99" step="1" aria-label="本次貨件車數" /><span class="field-help">會優先帶入本批次車數；僅接受 1–99 的正整數。</span></div>
        <div class="field-block"><label for="recipientName">收件人稱呼</label><input id="recipientName" type="text" value="Tiffany" data-preserve-on-new-batch /></div>
      </div>
      <div id="workspaceSource" class="workspace-source warn" aria-live="polite">正在確認本批次資料來源…</div>
      <div id="confirmPanel" class="confirm-panel">
        <label class="confirm-check"><input id="confirmPickup" type="checkbox" /> <span>我已確認 Pickup Date 是正確日期：<strong id="pickupConfirmText">尚未選擇</strong></span></label>
        <label class="confirm-check"><input id="confirmTrucks" type="checkbox" /> <span>我已確認本次貨件分成 <strong id="truckConfirmText">尚未填寫</strong> 車。</span></label>
      </div>
      <div class="row" style="margin-top:12px"><div><button id="buildEmailBtn" class="btn primary" type="button">一鍵產生並複製 Email</button> <button id="buildCasualEmailBtn" class="btn" type="button" hidden>一鍵產生並複製口語 Email</button></div></div>
      <div class="small" id="emailMeta" style="margin-top:10px">尚未產生信件。</div>
      <div id="emailPreview" class="email-preview" style="margin-top:8px"></div>
    </div>
  </section>
</main>
<script>
(() => {
  const $ = id => document.getElementById(id);
  const escapeHtml = value => String(value ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
  const parsePositiveInteger = (value, label) => { const raw=String(value??'').trim(); const number=Number(raw); if(!/^\d+$/.test(raw)||!Number.isInteger(number)||number<1) throw new Error(`${label}必須是正整數。`); return number; };
  let emailHtml = '';
  function resetConfirmation(kind) { if(kind==='date') $('confirmPickup').checked=false; else $('confirmTrucks').checked=false; updateConfirmationLabels(); }
  function updateConfirmationLabels() {
    const date=$('pickupDate').value, trucks=$('truckCount').value;
    $('pickupConfirmText').textContent=date||'尚未選擇'; $('truckConfirmText').textContent=trucks||'尚未填寫';
    $('pickupDate').classList.toggle('empty-date',!date);
    $('confirmPanel').classList.toggle('complete',$('confirmPickup').checked&&$('confirmTrucks').checked);
  }
  $('pickupDate').addEventListener('input',()=>resetConfirmation('date')); $('truckCount').addEventListener('input',()=>resetConfirmation('trucks'));
  $('confirmPickup').addEventListener('change',updateConfirmationLabels); $('confirmTrucks').addEventListener('change',updateConfirmationLabels); updateConfirmationLabels();
  $('recipientName').addEventListener('keydown',(event)=>{
    if(event.key!=='Enter') return;
    const command=$('recipientName').value.trim();
    if(command!=='芝麻開門'&&command!=='芝麻關門'&&command.toLowerCase()!=='bro') return;
    event.preventDefault();
    let message='';
    if(command.toLowerCase()==='bro'){
      const enabled=!(window.FBABroMode?.isEnabled?.()||localStorage.getItem('fba-workspace:bro-mode')==='open');
      if(window.FBABroMode) window.FBABroMode.setEnabled(enabled);
      else { if(enabled)localStorage.setItem('fba-workspace:bro-mode','open');else localStorage.removeItem('fba-workspace:bro-mode');window.dispatchEvent(new CustomEvent('fba-bro-mode-changed',{detail:{enabled}})); }
      message=enabled?'Bro 口語信件模式已開啟。':'Bro 口語信件模式已關閉。';
    }else{
      const enabled=command==='芝麻開門';
      if(window.FBAValueMode) window.FBAValueMode.setEnabled(enabled);
      else {
        if(enabled) localStorage.setItem('fba-workspace:value-mode','open');
        else localStorage.removeItem('fba-workspace:value-mode');
        window.dispatchEvent(new CustomEvent('fba-value-mode-changed',{detail:{enabled}}));
      }
      message=enabled?'全部隱藏功能已開啟。':'價值隱藏功能已關閉。';
    }
    $('recipientName').value='Tiffany';
    $('recipientName').dispatchEvent(new Event('input',{bubbles:true}));
    $('emailMeta').textContent=message;
  });
  function secretEmailEnabled(){return Boolean(window.FBAValueMode?.isEnabled?.()||localStorage.getItem('fba-workspace:value-mode')==='open'||window.FBABroMode?.isEnabled?.()||localStorage.getItem('fba-workspace:bro-mode')==='open');}
  function syncSecretEmailActions(){ $('buildCasualEmailBtn').hidden=!secretEmailEnabled(); }
  function parseData(value) {
    const lines=value.replace(/\r/g,'').split('\n').map(s=>s.trim()).filter(Boolean); if(lines.length<2) throw new Error('至少需要標題列與一筆資料。');
    const split=line=>line.includes('\t')?line.split('\t').map(s=>s.trim()):line.split(/\s{2,}/).map(s=>s.trim());
    const headers=split(lines[0]).map(h=>h.toLowerCase().replace(/\s/g,''));
    const find=(names)=>headers.findIndex(h=>names.includes(h)); const sku=find(['sku','merchantsku']), ctn=find(['ctn','入庫計畫','箱數','numberofboxes']), quantity=find(['quantity','入庫包數','數量']), expire=find(['expire','expiry','效期']);
    if(sku<0||ctn<0||quantity<0||expire<0) throw new Error('資料需要包含 SKU、CTN（或入庫計畫）、Quantity（或入庫包數）與 EXPIRE。');
    const rows=lines.slice(1).map(split).filter(r=>r[sku]).map((r,index)=>({sku:r[sku],ctn:parsePositiveInteger(r[ctn],`第 ${index+2} 列 CTN `),quantity:parsePositiveInteger(r[quantity],`第 ${index+2} 列 Quantity `),expire:r[expire]??''}));
    if(!rows.length) throw new Error('沒有成功解析到任何 SKU 資料。');
    return {rows,totalCtn:rows.reduce((sum,r)=>sum+r.ctn,0),totalQuantity:rows.reduce((sum,r)=>sum+r.quantity,0)};
  }
  function buildEmail(casual=false){ try {
    const data=parseData($('emailData').value), date=$('pickupDate').value; if(!date) throw new Error('請先選擇 Pickup Date。'); if(!$('confirmPickup').checked) throw new Error('請勾選確認 Pickup Date。');
    const trucks=parsePositiveInteger($('truckCount').value,'分車數'); if(trucks>99) throw new Error('分車數不可超過 99，請重新檢查。'); if(!$('confirmTrucks').checked) throw new Error('請勾選確認分成幾車。');
    const recipient=$('recipientName').value.trim()||'Tiffany'; const [y,m,d]=date.split('-').map(Number), dt=new Date(y,m-1,d); const fullDate=`${new Intl.DateTimeFormat('en-US',{weekday:'long'}).format(dt)}, ${new Intl.DateTimeFormat('en-US',{month:'long'}).format(dt)} ${d}, ${y}`;
    const rows=data.rows.map((r,index)=>`<tr><td>${index+1}</td><td>${escapeHtml(r.sku)}</td><td>${r.ctn}</td><td>${r.quantity}</td><td>${escapeHtml(r.expire)}</td></tr>`).join('');
    const table=`<table class="email-table"><thead><tr><th>No.</th><th>SKU</th><th>CTN</th><th>Quantity</th><th>Expiry Date</th></tr></thead><tbody>${rows}</tbody></table>`;
    emailHtml=casual
      ? `<div><p><strong>Subject:</strong> Yo — ${m}/${d} Pickup Game Plan</p><p>Wassup bro!</p><p>Quick heads-up: this load is locked in, split across ${trucks} trucks, and ready to roll — ${data.rows.length} SKUs, ${data.totalCtn} cartons, ${data.totalQuantity} units. Whole squad showed up.</p><p><strong>Pickup:</strong> ${fullDate}</p><p>Here’s the lineup:</p>${table}<p>That’s the whole play. Holler if anything looks wild; otherwise, we’re good to roll.</p><p>Appreciate you!</p></div>`
      : `<div><p><strong>Subject:</strong> ${m}/${d} Pickup – Shipment Details</p><p>Dear ${escapeHtml(recipient)},</p><p>Hope you’re doing well.</p><p>For this shipment, the cargo has been split into ${trucks} trucks (${data.rows.length} SKUs / ${data.totalCtn} cartons / ${data.totalQuantity} units).</p><p>Pickup Date: ${fullDate}</p><p>SKU / CTN / Quantity / Expiry Date:</p>${table}</div>`;
    $('emailPreview').innerHTML=emailHtml; $('emailMeta').textContent=`已產生${casual?'口語':''}信件：${data.rows.length} SKUs / ${data.totalCtn} cartons / ${data.totalQuantity} units / ${trucks} trucks`;return true;
  } catch(error) { emailHtml=''; $('emailPreview').innerHTML=''; $('emailMeta').textContent=error.message;return false; }}
  async function copyEmail(){
    if(!emailHtml)return false;const div=document.createElement('div');div.innerHTML=emailHtml;const plain=div.textContent||'';
    try{if(window.ClipboardItem&&navigator.clipboard?.write)await navigator.clipboard.write([new ClipboardItem({'text/plain':new Blob([plain],{type:'text/plain'}),'text/html':new Blob([emailHtml],{type:'text/html'})})]);else await navigator.clipboard.writeText(plain);$('emailMeta').textContent='信件已產生並複製，可直接貼到 Gmail／Outlook。';return true}catch(error){$('emailMeta').textContent='信件已產生，但瀏覽器未允許自動複製；請直接複製下方內容。';return false}
  }
  async function buildAndCopy(casual){if(buildEmail(casual))await copyEmail()}
  function syncFlashConfirmations(){
    let flash=null,batch=null;try{flash=JSON.parse(localStorage.getItem('fba-workspace:flash-mode')||'null');batch=JSON.parse(localStorage.getItem('fba-workspace:batch-meta')||'null')}catch{}
    if(!flash||flash.batchId&&batch?.id&&flash.batchId!==batch.id)return;
    $('confirmPickup').checked=true;$('confirmTrucks').checked=true;updateConfirmationLabels();
  }
  $('buildEmailBtn').addEventListener('click',()=>buildAndCopy(false));
  $('buildCasualEmailBtn').addEventListener('click',()=>buildAndCopy(true));
  window.addEventListener('fba-value-mode-changed',syncSecretEmailActions);
  window.addEventListener('fba-bro-mode-changed',syncSecretEmailActions);
  window.addEventListener('fba-workspace-ready',()=>{syncSecretEmailActions();syncFlashConfirmations()});
  syncSecretEmailActions();
})();
</script>
